version: '3.8'

# ============================================================
# Bank AI Call Engine - Docker Compose
# ============================================================
# 快速启动：docker-compose up -d
# 查看日志：docker-compose logs -f
# 停止服务：docker-compose down
# ============================================================

services:
  # ============================================================
  # AI 通话引擎服务
  # ============================================================
  ai-call-engine:
    build:
      context: .
      dockerfile: Dockerfile.ai-engine
    container_name: ai-call-engine
    restart: always
    ports:
      - "5001:5001"
    environment:
      # 时区
      - TZ=Asia/Shanghai

      # LLM 配置（阿里云百炼）
      - LLM_PROVIDER=dashscope_coding
      - LLM_API_KEY=${LLM_API_KEY:-}

      # TTS 配置（火山引擎豆包）
      - TTS_PROVIDER=doubao
      - DOUBAO_APPID=2058216235
      - DOUBAO_ACCESS_TOKEN=${DOUBAO_ACCESS_TOKEN:-}

      # ASR 配置（火山引擎豆包）
      - ASR_PROVIDER=volcengine_doubao
      - DOUBAO_ASR_RESOURCE_ID=volc.seedasr.sauc.duration
      - DOUBAO_ASR_WS_URL=wss://openspeech.bytedance.com/api/v3/sauc/bigmodel_async

      # 服务配置
      - PORT=5001
      - HOST=0.0.0.0
    volumes:
      # 日志目录
      - ./logs:/app/logs
      # TTS 缓存目录
      - ./tts_cache:/app/tts_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-call-network

  # ============================================================
  # Nginx 反向代理（可选，用于生产环境）
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ai-call-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-call-engine
    networks:
      - ai-call-network
    profiles:
      - with-nginx

networks:
  ai-call-network:
    driver: bridge

volumes:
  logs:
  tts_cache:
